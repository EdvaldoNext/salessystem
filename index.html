<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Edevaldo do Nascimento Prieto">
    <link rel="icon" href="fivicon.png" type="image/x-icon">
    <title>SalesSystem</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>🚀 Gestão de Vendas</h1>

        <a href="vendas.html" class="btn btn-voltar"> + Relatório Vendas</a>
    </header>

    

    <main class="container">
        <h2>Novo Registro</h2>
        <form id="vendaForm">
            <div class="form-grid">
                <div class="input-group full-width">
                    <label for="cliente">Nome do Cliente</label>
                    <input type="text" id="cliente" placeholder="Ex: João Silva" required>
                </div>
                
                <div class="input-group">
                    <label for="produto">Produto</label>
                    <input type="text" id="produto" placeholder="O que foi vendido?" required>
                </div>

                <div class="input-group">
                    <label for="quantidade">Quantidade</label>
                    <input type="number" id="quantidade" min="1" value="1" required>
                </div>

                <div class="input-group">
                    <label for="valor_unitario">Valor Unitário (R$)</label>
                    <input type="number" id="valor_unitario" step="0.01" placeholder="0.00" required>
                </div>

                <div class="input-group">
                    <label for="parcelas">Parcelas</label>
                    <select id="parcelas">
                        
                        <option value="1">30 dias</option>
                        <option value="2">2x</option>
                        <option value="3">3x</option>
                        <option value="4">4x</option>
                        <option value="5">5x</option>
                        <option value="6">6x</option>
                       
                    </select>
                </div>
            </div>

            <div id="preview" class="preview-box">
                Total: R$ 0,00 | Parcelas: 1x de R$ 0,00
            </div>

            <button type="submit" id="btnSalvar">Salvar Venda</button>
        </form>

       

    </main>

    <script src="supabase.js"></script>
    <script src="script.js"></script>
</body>
</html>
